<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hidden Route QR</title>
    <style>
      :root {
        color: #1f2937;
        background: #f5f7fb;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 18% 18%, rgba(172, 217, 255, 0.34), transparent 30%),
          radial-gradient(circle at 82% 78%, rgba(255, 196, 210, 0.3), transparent 32%),
          linear-gradient(180deg, #fbfcff, #f3f6fb);
      }

      main {
        width: min(520px, 100%);
        padding: clamp(22px, 5vw, 36px);
        border: 1px solid rgba(31, 41, 55, 0.08);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 28px 80px rgba(31, 41, 55, 0.12);
      }

      .eyebrow {
        margin: 0 0 8px;
        color: #64748b;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 12px;
        color: #0f172a;
        font-size: clamp(2rem, 8vw, 4.6rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        color: #475569;
        line-height: 1.75;
      }

      .qr-frame {
        display: grid;
        place-items: center;
        margin: 24px 0;
        padding: 18px;
        border: 1px dashed rgba(15, 23, 42, 0.16);
        border-radius: 12px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(245, 247, 251, 0.9));
      }

      .qr-frame img {
        width: min(280px, 74vw);
        aspect-ratio: 1;
        border-radius: 8px;
        background: #fff;
      }

      label {
        display: grid;
        gap: 8px;
        color: #334155;
        font-size: 0.86rem;
        font-weight: 800;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        min-height: 44px;
        padding: 0 12px;
        border: 1px solid rgba(15, 23, 42, 0.16);
        border-radius: 10px;
        color: #0f172a;
        background: #fff;
        font: inherit;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      button,
      a {
        display: inline-grid;
        min-height: 42px;
        padding: 0 14px;
        place-items: center;
        border: 0;
        border-radius: 999px;
        color: #fff;
        background: #0f172a;
        font: inherit;
        font-weight: 800;
        text-decoration: none;
        cursor: pointer;
      }

      a.secondary {
        color: #0f172a;
        background: #e2e8f0;
      }

      small {
        display: block;
        margin-top: 16px;
        color: #64748b;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Secret QR</p>
      <h1>二维码</h1>
      <p>把这张二维码放进彩蛋里。扫码后会进入一个看起来像 404 的页面，真正的入口藏在错误信息里。</p>

      <div class="qr-frame">
        <img id="qrImage" alt="隐藏网页二维码" />
      </div>

      <label>
        目标地址
        <input id="targetUrl" type="url" />
      </label>

      <div class="actions">
        <button id="resetButton" type="button">使用当前隐藏页地址</button>
        <a class="secondary" id="openHidden" target="_blank" rel="noreferrer">打开隐藏页</a>
      </div>

      <small>部署到 GitHub Pages 后，默认地址会自动变成线上同目录下的 hidden.html。</small>
    </main>

    <script>
      const qrImage = document.getElementById("qrImage");
      const targetUrl = document.getElementById("targetUrl");
      const resetButton = document.getElementById("resetButton");
      const openHidden = document.getElementById("openHidden");

      function defaultHiddenUrl() {
        return new URL("hidden.html", window.location.href).href;
      }

      function renderQr(url) {
        const normalized = String(url || "").trim() || defaultHiddenUrl();
        targetUrl.value = normalized;
        openHidden.href = normalized;
        qrImage.src =
          "https://api.qrserver.com/v1/create-qr-code/?size=360x360&margin=18&data=" +
          encodeURIComponent(normalized);
      }

      targetUrl.addEventListener("input", () => renderQr(targetUrl.value));
      resetButton.addEventListener("click", () => renderQr(defaultHiddenUrl()));
      renderQr(defaultHiddenUrl());
    </script>
  </body>
</html>
